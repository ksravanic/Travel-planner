<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner - Plan Your Next Adventure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-weight: bold;
            color: #3b71ca;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #3b71ca;
        }

        .btn-plan {
            background-color: #3e5f40;
            color: white !important;
            padding: 10px 20px;
            border-radius: 5px;
        }

        /* Hero Section */
        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 40px;
        }

        /* Grid Layout */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 15px;
        }

        .card p {
            color: #777;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn-start {
            background-color: #3b71ca;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s;
            display: block;
        }

        .btn-start:hover {
            background-color: #2c5496;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">✈ Travel Planner</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#" class="btn-plan">Plan a Trip</a>
        </div>
    </nav>

    <header>
        <h1>Plan Your Next Adventure</h1>
    </header>

    <div class="container">
        <div class="card">
            <img src="destination.jpg" alt="Destination" class="card-img">
            <div class="card-content">
                <div>
                    <h3>1. Choose Destination</h3>
                    <p>Select where you want to go</p>
                </div>
                <a href="#" class="btn-start">Get Started</a>
            </div>
        </div>

        <div class="card">
            <img src="dates.jpg" alt="Dates" class="card-img">
            <div class="card-content">
                <div>
                    <h3>2. Set Dates</h3>
                    <p>Pick your travel dates</p>
                </div>
                <a href="#" class="btn-start">Get Started</a>
            </div>
        </div>

        <div class="card">
            <img src="flights.jpg" alt="Flights" class="card-img">
            <div class="card-content">
                <div>
                    <h3>3. Find Flights</h3>
                    <p>Search flights</p>
                </div>
                <a href="#" class="btn-start">Get Started</a>
            </div>
        </div>

        <div class="card">
            <img src="hotel.jpg" alt="Hotel" class="card-img">
            <div class="card-content">
                <div>
                    <h3>4. Book Hotel</h3>
                    <p>Find best hotels</p>
                </div>
                <a href="#" class="btn-start">Get Started</a>
            </div>
        </div>
    </div>

</body>
</html>
